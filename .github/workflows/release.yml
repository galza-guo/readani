name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: readani
  APPLE_SIGNING_IDENTITY: "Developer ID Application: Lite Guo (T96QFDVD9V)"
  APPLE_TEAM_ID: T96QFDVD9V

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build MSI
        run: bun run tauri build --bundles msi

      - name: Collect MSI artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          MSI_PATH=$(find src-tauri/target -path '*/bundle/msi/*.msi' -type f | sort | tail -n 1)
          if [[ -z "${MSI_PATH:-}" || ! -f "$MSI_PATH" ]]; then
            echo "Could not find the generated MSI." >&2
            exit 1
          fi
          cp "$MSI_PATH" release-artifacts/

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: release-artifacts/*
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Import Apple signing certificate
        shell: bash
        run: ./scripts/import_apple_certificate.sh

      - name: Build signed DMG
        shell: bash
        run: ./build-dmg.sh

      - name: Notarize and staple DMG
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -n "${APPLE_API_PRIVATE_KEY:-}" && -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
            export APPLE_API_KEY_PATH="$KEY_PATH"
          elif [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" ]]; then
            echo "Using Apple ID fallback for notarization."
          else
            echo "Missing notarization credentials." >&2
            echo >&2
            echo "Configure one of:" >&2
            echo "  1. APPLE_API_KEY + APPLE_API_ISSUER + APPLE_API_PRIVATE_KEY" >&2
            echo "  2. APPLE_ID + APPLE_PASSWORD" >&2
            exit 1
          fi

          DMG_PATH=$(find src-tauri/target -path '*/bundle/dmg/*.dmg' -type f | sort | tail -n 1)
          APP_PATH=$(find src-tauri/target -path '*/bundle/macos/readani.app' -type d | sort | tail -n 1)

          if [[ -z "${DMG_PATH:-}" || ! -f "$DMG_PATH" ]]; then
            echo "Could not find the generated DMG." >&2
            exit 1
          fi

          if [[ -z "${APP_PATH:-}" || ! -d "$APP_PATH" ]]; then
            echo "Could not find the generated app bundle." >&2
            exit 1
          fi

          ./scripts/notarize_dmg.sh "$DMG_PATH" "$APP_PATH"

      - name: Collect DMG artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          DMG_PATH=$(find src-tauri/target -path '*/bundle/dmg/*.dmg' -type f | sort | tail -n 1)
          if [[ -z "${DMG_PATH:-}" || ! -f "$DMG_PATH" ]]; then
            echo "Could not find the generated DMG." >&2
            exit 1
          fi
          cp "$DMG_PATH" release-artifacts/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release-artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          name: readani ${{ github.ref_name }}
